services:
  fastapi:
    container_name: fastapi
    # 환경변수로부터 사용할 도커 이미지 이름 가져오기
    # 이미 도커 레포지토리에 푸시한 이미지를 활용하여 컨테이너를 실행
    image: ${DOCKER_WEB_IMAGE}
    env_file:
      - .env
    # 컨테이너 실행 시 DB 마이그레이션 진행 후 uvicorn 으로 서버 실행
    entrypoint: sh -c "uv run alembic upgrade head && uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload"
    ports:
      - "8000:8000"
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/healthcheck || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 3
    depends_on:
      - mysql
      - redis
    networks:
      - web_server

  ai-worker:
    container_name: ai-worker
    # 환경변수로부터 사용할 도커 이미지 이름 가져오기
    # 이미 도커 레포지토리에 푸시한 이미지를 활용하여 컨테이너를 실행
    image: ${DOCKER_AI_WORKER_IMAGE}
    env_file:
      - .env
    volumes:
      - media_volume:/app/media:ro
      # 이미지 경량화를 위해 모델을 마운트하여 사용, 모델을 scp 명령어를 통해 EC2내의 도커 볼륨으로 복사할 예정
      - ./models:/app/worker/models:ro
    depends_on:
      - redis
    networks:
      - web_server

  mysql:
    container_name: mysql
    image: mysql:8.0
    volumes:
      - mysql_volume:/var/lib/mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_PORT: ${DB_PORT}
    ports:
      - "${DB_PORT}:3306"
    healthcheck:
      test: ["CMD", "mysqladmin" ,"ping", "-h", "localhost"]
      timeout: 20s
      retries: 5
    networks:
      - web_server

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 3
    networks:
      - web_server

  nginx:
    container_name: nginx
    image: nginx:latest
    ports:
      - "80:80"
    volumes:
      # nginx 설정 파일을 마운트하여 nginx 컨테이너 실행 시 해당 설정 파일을 활용
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
      # 기존에 Fastapi에서 서빙하던 static이나 media(사용자 업로드 파일)를 볼륨을 활용하여 nginx가 서빙하도록 볼륨을 마운트
      - static_volume:/vol/web/static:ro
      - media_volume:/vol/web/media:ro
    networks:
      - web_server
    depends_on:
      - fastapi

volumes:
  mysql_volume:
  static_volume:
  media_volume:

networks:
  web_server:
    driver: bridge
    name: ws
